jaffle_shop:
  outputs:
    dev:
      account: SZEBENZ-OS44603
      user: DBT_DEV_USER
      role: ADMINISTRATOR_DEV # Snowflakeでは引用符なしの識別子は大文字に変換されるため、大文字で指定
      private_key_path: /Users/kohta/.ssh/snowflake/dbt_dev_user_key
      database: DEV
      schema: BRONZE
      threads: 1
      type: snowflake
      warehouse: DBT_DEV_WH
    # Prefect Cloudのマネージド実行環境用。秘密鍵ファイルにアクセスできないため、
    # SNOWFLAKE_PRIVATE_KEY環境変数(Prefect Secret block経由)から鍵の中身を読み込む
    cloud:
      account: SZEBENZ-OS44603
      user: DBT_DEV_USER
      role: ADMINISTRATOR_DEV
      private_key: "{{ env_var('SNOWFLAKE_PRIVATE_KEY') }}"
      database: DEV
      schema: BRONZE
      threads: 1
      type: snowflake
      warehouse: DBT_DEV_WH
    prd:
      account: SZEBENZ-OS44603
      user: DBT_PRD_USER
      role: ADMINISTRATOR_PRD
      private_key_path: /Users/kohta/.ssh/snowflake/dbt_prd_user_key
      database: PRD
      schema: BRONZE
      threads: 1
      type: snowflake
      warehouse: DBT_PRD_WH
  target: dev
