jaffle_shop:
  outputs:
    # 秘密鍵はローカル・Prefect Cloudのどちらでもenv_var()経由で読み込む(ローカルはdirenv、
    # Prefect Cloudのマネージド実行はjob_variables経由のSecret blockでSNOWFLAKE_PRIVATE_KEY_DEV/
    # SNOWFLAKE_PRIVATE_KEY_PRDをセットする)
    dev:
      account: SZEBENZ-OS44603
      user: DBT_DEV_USER
      role: ADMINISTRATOR_DEV # Snowflakeでは引用符なしの識別子は大文字に変換されるため、大文字で指定
      private_key: "{{ env_var('SNOWFLAKE_DBT_USER_PRIVATE_KEY_DEV') }}"
      database: DEV
      schema: BRONZE
      threads: 1
      type: snowflake
      warehouse: DBT_DEV_WH
    prd:
      account: SZEBENZ-OS44603
      user: DBT_PRD_USER
      role: ADMINISTRATOR_PRD
      private_key: "{{ env_var('SNOWFLAKE_DBT_USER_PRIVATE_KEY_PRD') }}"
      database: PRD
      schema: BRONZE
      threads: 1
      type: snowflake
      warehouse: DBT_PRD_WH
    lightdash-preview:
      account: SZEBENZ-OS44603
      user: LIGHTDASH_DEV_USER
      role: LIGHTDASH_DEV # Snowflakeでは引用符なしの識別子は大文字に変換されるため、大文字で指定
      private_key: "{{ env_var('SNOWFLAKE_LIGHTDASH_USER_PRIVATE_KEY_DEV') }}"
      database: DEV
      schema: BRONZE
      threads: 1
      type: snowflake
      warehouse: DBT_DEV_WH
  target: dev
